server:
  port: 8082

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=product_service_db;encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME_PRODUCT_SERVICE}
    password: ${DB_PASSWORD_PRODUCT_SERVICE}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
  